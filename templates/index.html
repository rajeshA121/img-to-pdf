<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IMG to PDF</title>
  <style>
    :root {
      --bg: url('https://th.bing.com/th/id/OIP.m1KEGodFuxcxnYdPP2xp5gHaEK?w=290&h=180&c=7&r=0&o=7&dpr=1.4&pid=1.7&rm=3');
      --card-bg: rgba(0, 0, 0, 0.55);
      --text: #f5f1f1;
      --accent: #28a745;
      --radius: 16px;
      --shadow: 0 12px 35px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg) center/cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: min(92vw, 480px);
      padding: 2.2rem;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0 0 1.3rem;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: 0.02em;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.55);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      align-items: stretch;
    }

    input[type="file"] {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 0.75rem;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 1rem;
    }

    input[type="file"]::-webkit-file-upload-button {
      padding: 0.6rem 1rem;
      border-radius: 0.75rem;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: var(--text);
      cursor: pointer;
    }

    button {
      padding: 1rem;
      font-size: 1.1rem;
      background-color: var(--accent);
      color: var(--text);
      border: none;
      border-radius: 0.9rem;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.35);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
    }

    @media (max-width: 360px) {
      .container {
        padding: 1.5rem;
      }

      input[type="file"] {
        font-size: 0.95rem;
      }

      button {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Image to PDF Converter</h1>
    <form action="/convert" method="POST" enctype="multipart/form-data">
      <input type="file" name="images" multiple required />
      <button type="submit">Convert</button>
    </form>
  </div>
</body>
</html>
